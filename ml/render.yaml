# ═══════════════════════════════════════════════════════════════
#  Render Blueprint — InSilico ML Backend
#  https://render.com/docs/blueprint-spec
# ═══════════════════════════════════════════════════════════════
#  Usage: Push this repo to GitHub, then in Render dashboard
#         → New → Blueprint → select this repo.
#         Render auto-detects render.yaml and deploys.
# ═══════════════════════════════════════════════════════════════

services:
  - type: web
    name: insillico-ml
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: oregon                    # closest free-tier region to US
    plan: free                        # 512 MB RAM, sleeps after 15 min
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: GROQ_API_KEY
        sync: false                   # manually set in Render dashboard
      - key: RIVA_API_KEY
        sync: false
