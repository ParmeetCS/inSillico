# ═══════════════════════════════════════════════════════════════
#  InSilico — Render Blueprint (Infrastructure as Code)
# ═══════════════════════════════════════════════════════════════
#  This file tells Render how to build and deploy the ML backend.
#  The Next.js frontend is deployed separately on Vercel.
#
#  Usage: Connect your GitHub repo to Render → it auto-detects
#         this file and creates the service.
# ═══════════════════════════════════════════════════════════════

services:
  - type: web
    name: insillico-ml
    runtime: docker
    dockerfilePath: ./ml/Dockerfile
    dockerContext: ./ml
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
